<!DOCTYPE html>

<head>

<link rel="stylesheet" href="assets/style.css">

<body>

<div class="stripe-bg"></div>
<div class="stripe-bg-left"></div>
<div class="corner corner--tl"></div>
<div class="corner corner--tr"></div>
<div class="corner corner--bl"></div>
<div class="corner corner--br"></div>

<main class="container">

  <div class="construction-bar">
    <div class="bar-segment bar-segment--long"></div>
    <div class="bar-dot"></div>
    <div class="bar-segment bar-segment--short"></div>
    <div class="bar-dot"></div>
    <div class="bar-segment bar-segment--long"></div>

  <div class="eyebrow">Something is coming</div>

  <h1>Under<br><em>Construction</em></h1>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-diamond"></div>

      <span id="pct">0%</span>

    <div class="progress-track">
      <div class="progress-fill" id="bar"></div>
    </div>

    <input type="email" id="emailInput" placeholder="Enter your email address" />
